apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jellyfin-svc
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8096
      targetPort: jellyfin
      protocol: TCP
      name: {{ .Release.Name }}-jellyfin
  selector:
    {{- include "jellyfin.selectorLabels" . | nindent 4 }}
